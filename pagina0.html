<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestros Momentos ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ff6a88,#ff99ac);
text-align:center;
margin:0;
padding:0;
overflow-x:hidden;
color:white;
}

h1{
margin-top:40px;
font-size:40px;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.foto{
margin:20px;
background:white;
border-radius:15px;
overflow:hidden;
width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:transform 0.3s;
cursor:pointer;
}

.foto:hover{
transform:scale(1.05);
}

.foto img{
width:100%;
height:320px;
object-fit:cover;
}

.frase{
padding:10px;
color:#333;
}

.boton{
margin-top:25px;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff3d6e;
color:white;
cursor:pointer;
}

.mensaje{
display:none;
font-size:20px;
margin-top:20px;
}

.corazon{
position:fixed;
top:-10px;
font-size:20px;
animation:caer 6s linear infinite;
}

@keyframes caer{
0%{transform:translateY(-10px);}
100%{transform:translateY(110vh);}
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#modal img{
max-width:80%;
max-height:80%;
border-radius:10px;
}

#videoModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

#videoModal video{
max-width:80%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>❤️ Nosotros ❤️</h1>

<div class="galeria">

<div class="foto" onclick="abrir(this)">
<img src="foto1.jpg">
<div class="frase">Cada momento contigo es mi favorito ❤️</div>
</div>

<div class="foto" onclick="abrir(this)">
<img src="foto2.jpg">
<div class="frase">Tu sonrisa es lo mejor que me pasó 😊</div>
</div>

<div class="foto" onclick="abrir(this)">
<img src="foto3.jpg">
<div class="frase">Contigo todo es más bonito 💕</div>
</div>

<div class="foto" onclick="abrir(this)">
<img src="foto4.jpg">
<div class="frase">No necesito nada más si te tengo a ti 💖</div>
</div>

<div class="foto" onclick="abrir(this)">
<img src="foto5.jpg">
<div class="frase">Eres mi lugar favorito en el mundo 🌎❤️</div>
</div>

</div>

<button class="boton" onclick="mostrarMensaje()">Abrir mensaje 💌</button>

<div class="mensaje" id="mensaje">
Gracias por estar conmigo. Cada día contigo es especial ❤️
</div>

<br>

<button class="boton" onclick="abrirVideo()">Ver nuestro video 🎥</button>

<div id="modal" onclick="cerrar()">
<img id="imgGrande">
</div>

<div id="videoModal" onclick="cerrarVideo()">
<video controls autoplay>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<script>

function mostrarMensaje(){
document.getElementById("mensaje").style.display="block"
}

function abrir(elemento){
let img=elemento.querySelector("img").src
document.getElementById("imgGrande").src=img
document.getElementById("modal").style.display="flex"
}

function cerrar(){
document.getElementById("modal").style.display="none"
}

function abrirVideo(){
document.getElementById("videoModal").style.display="flex"
}

function cerrarVideo(){
document.getElementById("videoModal").style.display="none"
}

function crearCorazon(){
const corazon=document.createElement("div")
corazon.classList.add("corazon")
corazon.innerHTML="❤️"
corazon.style.left=Math.random()*100+"vw"
corazon.style.animationDuration=(Math.random()*3+3)+"s"
document.body.appendChild(corazon)

setTimeout(()=>{
corazon.remove()
},6000)
}

setInterval(crearCorazon,300)

</script>

</body>
</html>
